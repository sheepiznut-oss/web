<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ngang{
            background-color: aquamarine;
            list-style: none;
            min-height: 30px;
            display: flex;
            width: 500px;
        }
        .ngang li {
            line-height: 30px;
            margin-left: 30px;
        }
        .ngang li a{
            text-decoration: none;
        }
        .ngang li a:hover{
            background-color: yellow;
            border-radius: 5px;
        }
        .ngang li a:hover{
            font-weight: bolder;
        }
        .doc{
            background-color: aqua;
            list-style: none;
            padding: 0;
            width: 250px;
        }
        .doc li{
            line-height: 30px;
            height: 30px;
            border-bottom: white solid 1px;
        }
        .doc li:hover{
            background-color: blue;
            font-style: italic;
        }


    </style>
</head>
<body>
    <ul class="ngang">
        <li><a href="">Trang chủ </a></li>
        <li><a href="">Giới thiệu</a></li>
        <li><a href="">Sản phẩm</a></li>
        <li><a href="">Dịch vụ</a></li>
        <li><a href="">Liên hệ</a></li>
    </ul>
    <ul class="doc">
        <li>Trang chủ</li>
        <li>Giới thiệu</li>
        <li>Sản phẩm</li>
        <li>Dịch vụ</li>
        <li>Liên hệ</li>
    </ul>
</body>
</html>
