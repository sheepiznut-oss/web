<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <title>Document</title>
    <style>
        body{
            margin: 0;
        }
        .topnav{
            overflow: hidden;
            background-color: black;
        }
        .topnav a{
            float: left;
            display: block;
            color: white;
            text-align: left;
            padding: 15px 15px;
            text-decoration: none;
            font-size: 17px;
            
        }
        .topnav a:hover{
            background-color: bisque;
            color: black;
            font-weight: bolder;

        }
        @media screen and (max-width:600px){
            .topnav a:not(:first-child){display: none;}
            .topnav a.icon{
                float: right;
                display: block;
                
            }
        }
        @media screen and (max-width:600px){
            .topnav.responsive{
                position: relative;
            }
            .topnav.responsive .icon{
                position: absolute;
                right: 0;
                top: 0;
            }
            .topnav.responsive a{
                float: none;
                display: block
                
                
            }
        }

    </style>
</head>
<body>
    <div class="topnav" id="mytopnav">
        <a href="#home">Home</a>
        <a href="#new">News</a>
        <a href="#contact">Contact</a>
        <a href="#about">About</a>
        <a href="" class="icon"><i class="bi bi-list"></i></a>
        
    </div>
</body>
</html>
