<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <h1>User Information</h1>
        <div id="userInfo"></div>
    </div>
    <p><strong></strong></p>
    <script>
        var userData={
            "name":"Nguyễn Thị Mộng Kiều",
            "age":30,
            "email":"dh62300975@student.stu.edu.vn",
            "address":{
                "city":"Hồ Chí Minh",
                "state":"NY",
                "zipcode":"10001"
            }
        }
        function displayUserInfo(data){
            var userInfoElment=document.getElementById('userInfo');
            userInfoElment.innerHTML=`
                <p><strong>Name:</strong>${data.name}</p>
                <p><strong>Age:</strong>${data.age}</p>
                <p><strong>Email:</strong>${data.email}</p>
                <p><strong>Address</strong>${data.address.city}</p>
            ` 
        }
        displayUserInfo(userData)
    </script>
</body>
</html>
