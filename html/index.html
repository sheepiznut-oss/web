<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verdish</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
        href="../css/index.css"/>
        
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="../img/logo.svg" alt="logo">
            <span>Verdish</span>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Tìm sản phẩm">
            <button><i class="fa fa-search"></i></button>
        </div>

        <div class="menu-right">
            <button>Trang chủ</button>
            <button>Sản phẩm</button>

            <div class="cart">
                <i class="fa fa-shopping-cart"></i>
                <span>0</span>
            </div>

            <div class="user" onclick="openRegister()">
            User <i class="fa fa-chevron-down"></i>
        </div>
        </div>
    </header>

    <!-- MENU -->
    <nav class="navbar">
        <div class="nav-left">
            <span><i class="fa fa-bars"></i> Danh mục</span>
            <span><i class="fa fa-newspaper"></i> Tin tức</span>
        </div>

        <div class="support">
            <i class="fa fa-headset"></i>
            24/7 Support <br>
            0352 321 876
        </div>
    </nav>

    <!-- BANNER -->
    <section class="banner">
        <img id="bannerImage" src="../img/slider1.jpg" alt="banner">
    </section>

    <!-- TITLE -->
    <section class="title-section">
        <h1>Sản phẩm tại Verdish</h1>

        <div class="tabs">

            <button class="active">
                Bán chạy nhất
            </button>

            <button>
                Hàng mới về
            </button>

            <button onclick="goToLab()">
                Lab thực hành
            </button>

        </div>
    </section>

    <!-- PRODUCTS -->
    <section class="product-page">

        <!-- SIDEBAR -->
        <aside class="sidebar">

        <div class="box">
            <h3>Danh mục</h3>

            <div class="category">
                <span>Trà</span>
                <i class="fa fa-chevron-down"></i>
            </div>

            <div class="category">
                <span>Thức uống</span>
                <i class="fa fa-chevron-down"></i>
            </div>

            <div class="category">
                <span>Hạt</span>
                <i class="fa fa-chevron-down"></i>
            </div>
        </div>

        <div class="box">
            <h3>Bộ lọc giá</h3>

            <div class="price-filter">
                <input type="number" placeholder="Từ">
                <input type="number" placeholder="Đến">
                <button>Lọc</button>
            </div>
        </div>

        </aside>

        <!-- MAIN -->
        <main class="products-container">

        <div class="top-filter">
            <div>
            <label>Sắp xếp:</label>

            <select>
                <option>Theo mới nhất</option>
                <option>Giá tăng dần</option>
                <option>Giá giảm dần</option>
            </select>
            </div>

            <div class="view-icons">
                <i class="fa fa-th-large active"></i>
                <i class="fa fa-list"></i>
            </div>
        </div>

        <!-- PRODUCT GRID -->
        <div class="product-grid" id="productGrid">

        </div>

        </main>

    </section>
    <!-- FORM ĐĂNG KÝ -->
    <div class="register-modal" id="registerModal">

        <div class="register-form">

            <span class="close-btn" onclick="closeRegister()">
                &times;
            </span>

            <h2>Đăng ký</h2>

            <input type="text" id="hoten" placeholder="Nhập họ tên...">

            <input type="email" id="email" placeholder="Nhập email...">

            <input type="password" id="mk" placeholder="Nhập mật khẩu...">

            <input type="password" id="nhaplaimk" placeholder="Nhập lại mật khẩu...">

            <div id="thongbao"></div>

            <button onclick="dangKy()">
                Đăng ký
            </button>

        </div>

    </div>
    <!-- CHAT -->
    <div class="chat-box">
        <i class="fa fa-comment"></i>
        Chat Zalo
    </div>

    <script src="../javascript/index.js"></script>
</body>
</html>
